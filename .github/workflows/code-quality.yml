name: Code Quality

on:
  push:
    branches: [main, development, feature/**, bugfix/**, hotfix/**]
  pull_request:
    branches: [main, beta, development]

jobs:
  quality:
    uses: ConductionNL/.github/.github/workflows/quality.yml@main
    with:
      app-name: pipelinq
      php-version: "8.3"
      enable-psalm: false
      enable-phpstan: false
      enable-phpmetrics: true
      enable-frontend: true
      enable-eslint: true
    permissions:
      pull-requests: write
