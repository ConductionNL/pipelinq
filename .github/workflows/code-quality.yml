name: Code Quality

on:
  push:
    branches: [main, development, feature/**, bugfix/**, hotfix/**]
  pull_request:
    branches: [main, beta, development]
  workflow_dispatch:

jobs:
  quality:
    uses: ConductionNL/.github/.github/workflows/quality.yml@main
    with:
      app-name: pipelinq
      enable-sbom: true
      enable-phpunit: true
      enable-newman: true
      newman-collection-path: "tests/newman"
      # Re-run the repair steps so the OpenRegister registers/schemas the
      # API endpoints depend on are provisioned before Newman hits them.
      newman-seed-command: 'php occ app:disable pipelinq && php occ app:enable pipelinq'
      enable-playwright: true
      enable-playwright-coverage: true
      playwright-coverage-threshold: 75
      additional-apps: '[{"repo":"ConductionNL/openregister","app":"openregister"}]'
      playwright-seed-command: 'php occ app:disable pipelinq && php occ app:enable pipelinq'
